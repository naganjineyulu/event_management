<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Student Login - Access your university event management dashboard and participate in campus events">
    <meta name="keywords" content="student login, event registration, university portal">
    <meta name="author" content="Event Management Team">
    <meta property="og:title" content="Student Login | University Event Management">
    <meta property="og:description" content="Login to access your university event dashboard">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Events">
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    <title>Student Login | University Event Management</title>

    <!-- Global CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="fade-in">

    <!-- ===== NAVIGATION BAR ===== -->
    <div class="navbar">
        <a href="/">Home</a>
        <a href="/login">Student Login</a>
        <a href="/register">Register</a>
    </div>

    <h2>Student Login</h2>

    {% if error %}
        <div class="payment-error" style="max-width: 380px; margin: 15px auto;">
            {{ error }}
        </div>
    {% endif %}

    {% if success %}
        <div style="max-width: 380px; margin: 15px auto; padding: 12px 14px; border-radius: 8px; background: rgba(34, 197, 94, 0.15); color: #bbf7d0; border: 1px solid rgba(34, 197, 94, 0.35);">
            {{ success }}
        </div>
    {% endif %}

    <!-- ===== LOGIN FORM ===== -->
    <form method="POST">

        <!-- Username Field -->
        <input type="text"
               name="username"
               placeholder="Registered Name or Shared Email"
               required><br>

        <!-- IMPORTANT: name must match Flask -->
        <input type="text"
               name="enrollment"
               placeholder="Enrollment Number"
               required><br>

        <input type="password"
               name="password"
               placeholder="Password"
               required><br>

        <br>

        <button type="submit">
            Login
        </button>

    </form>

    <!-- ===== FOOTER / LINKS ===== -->
    <div style="margin-top:30px;">
        <p>
            New student?
            <a href="/register">Create Account</a>
        </p>
        <p>
            <a href="/forgot_password">Forgot Password?</a>
        </p>
    </div>

    <!-- PWA Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('{{ url_for("static", filename="service-worker.js") }}')
                .then(registration => console.log('Service Worker registered'))
                .catch(error => console.log('Service Worker registration failed:', error));
        }
    </script>

</body>
</html>
