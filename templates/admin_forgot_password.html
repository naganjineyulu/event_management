<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Admin Forgot Password - Reset admin password for the university event management system">
    <meta name="keywords" content="admin password reset, admin forgot password, admin portal">
    <meta name="author" content="Event Management Team">
    <meta property="og:title" content="Admin Password Reset | University Event Management">
    <title>Admin Password Reset | University Event Management</title>

    <!-- Global CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <style>
        .admin-forgot-password-container {
            max-width: 420px;
            margin: 60px auto;
            padding: 40px 35px;
            border-radius: 12px;
            background: linear-gradient(135deg, rgba(20, 20, 30, 0.95) 0%, rgba(40, 40, 60, 0.95) 100%);
            border: 2px solid #fbbf24;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.7), 0 0 30px rgba(251, 191, 36, 0.2);
        }

        .admin-forgot-password-header {
            text-align: center;
            color: #fff;
            margin-bottom: 35px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .admin-forgot-password-header .key-icon {
            font-size: 48px;
            animation: keyPulse 2s infinite;
            display: inline-block;
        }

        @keyframes keyPulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.15);
            }
        }

        .admin-forgot-password-header h1 {
            font-size: 28px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 0;
            background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .admin-forgot-password-header p {
            font-size: 13px;
            color: #cbd5f5;
            margin: 0;
            text-align: center;
        }

        .admin-forgot-password-form {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            color: #cbd5f5;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .admin-forgot-password-form input {
            padding: 14px 16px;
            border: 2px solid #444;
            border-radius: 8px;
            background-color: #1a1a2e;
            color: #fff;
            font-size: 15px;
            transition: all 0.3s ease;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .admin-forgot-password-form input:focus {
            outline: none;
            border-color: #fbbf24;
            background-color: #222233;
            box-shadow: 0 0 15px rgba(251, 191, 36, 0.25);
        }

        .admin-forgot-password-form input::placeholder {
            color: #6b7280;
        }

        .submit-btn {
            padding: 14px 16px;
            background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
            color: #000;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-top: 10px;
            box-shadow: 0 5px 20px rgba(251, 191, 36, 0.3);
        }

        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(251, 191, 36, 0.4);
        }

        .submit-btn:active {
            transform: translateY(-1px);
        }

        .info-section {
            text-align: center;
            margin-top: 30px;
            padding-top: 25px;
            border-top: 1px solid #444;
            color: #cbd5f5;
            font-size: 13px;
            line-height: 1.8;
        }

        .info-section p {
            margin: 8px 0;
        }

        .info-section a {
            color: #fbbf24;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .info-section a:hover {
            text-decoration: underline;
            color: #f59e0b;
        }

        .success-message {
            background: linear-gradient(135deg, #065f46 0%, #047857 100%);
            border: 2px solid #10b981;
            color: #a7f3d0;
            padding: 14px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            text-align: center;
            display: none;
            box-shadow: 0 5px 15px rgba(16, 185, 129, 0.2);
        }

        .success-message.show {
            display: block;
            animation: slideDown 0.3s ease;
        }

        .error-message {
            background: linear-gradient(135deg, #7f1d1d 0%, #991b1b 100%);
            border: 2px solid #dc2626;
            color: #fecaca;
            padding: 14px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            text-align: center;
            display: none;
            box-shadow: 0 5px 15px rgba(220, 38, 38, 0.2);
        }

        .error-message.show {
            display: block;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
        }

        .back-link a {
            color: #fbbf24;
            text-decoration: none;
            font-weight: 600;
            font-size: 13px;
            transition: all 0.3s ease;
        }

        .back-link a:hover {
            color: #f59e0b;
            text-decoration: underline;
        }

        .security-badge {
            text-align: center;
            margin-top: 15px;
            color: #4b5563;
            font-size: 12px;
            letter-spacing: 0.5px;
        }

        .security-badge span {
            color: #10b981;
            font-weight: 700;
        }
    </style>
</head>

<body class="fade-in">

    <!-- ===== NAVIGATION BAR ===== -->
    <div class="navbar">
        <a href="/">Home</a>
        <a href="/login">Student Login</a>
        <a href="/admin_login">Admin Login</a>
    </div>

    <!-- ===== ADMIN FORGOT PASSWORD CONTAINER ===== -->
    <div class="admin-forgot-password-container">

        <div class="admin-forgot-password-header">
            <div class="key-icon">🔑</div>
            <h1>Admin Reset Password</h1>
            <p>Enter your admin credentials to receive a reset link</p>
        </div>

        <!-- Success Message -->
        <div class="success-message" id="successMessage"></div>

        <!-- Error Message -->
        <div class="error-message" id="errorMessage"></div>

        <!-- Forgot Password Form -->
        <form method="POST" class="admin-forgot-password-form" onsubmit="return validateForm()">

            <div class="form-group">
                <label for="username">Admin Username</label>
                <input type="text"
                       id="username"
                       name="username"
                       placeholder="Enter your admin username"
                       autocomplete="username"
                       required>
            </div>

            <div class="form-group">
                <label for="email">Admin Email</label>
                <input type="email"
                       id="email"
                       name="email"
                       placeholder="Enter your admin email"
                       autocomplete="email"
                       required>
            </div>

            <button type="submit" class="submit-btn">
                📧 Send Reset Link
            </button>

        </form>

        <!-- Back to Login -->
        <div class="back-link">
            <a href="/admin_login">← Back to Admin Login</a>
        </div>

        <!-- Info Section -->
        <div class="info-section">
            <p>💡 We'll send a password reset link to your registered email.</p>
            <p>Remember your password? <a href="/admin_login">Login here</a></p>
            <p>Don't have an admin account? <a href="/admin_register">Register here</a></p>
        </div>

        <!-- Security Badge -->
        <div class="security-badge">
            <span>✓ Secure</span> | <span>🔐 Encrypted</span>
        </div>

    </div>

    <!-- ===== VALIDATION SCRIPT ===== -->
    <script>
        function validateForm() {
            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const errorMessage = document.getElementById('errorMessage');
            const successMessage = document.getElementById('successMessage');

            // Clear previous messages
            errorMessage.classList.remove('show');
            successMessage.classList.remove('show');

            // Validate inputs
            if (username === '') {
                showError('Admin username is required');
                return false;
            }

            if (email === '') {
                showError('Admin email is required');
                return false;
            }

            // Basic email validation
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                showError('Please enter a valid email address');
                return false;
            }

            if (username.length < 3) {
                showError('Username must be at least 3 characters long');
                return false;
            }

            return true;
        }

        function showError(message) {
            const errorMessage = document.getElementById('errorMessage');
            errorMessage.textContent = '❌ ' + message;
            errorMessage.classList.add('show');
        }

        function showSuccess(message) {
            const successMessage = document.getElementById('successMessage');
            successMessage.textContent = '✓ ' + message;
            successMessage.classList.add('show');
        }

        // Show messages if provided by server
        {% if error %}
            document.addEventListener('DOMContentLoaded', function() {
                showError({{ error|tojson }});
            });
        {% endif %}

        {% if success %}
            document.addEventListener('DOMContentLoaded', function() {
                showSuccess({{ success|tojson }});
            });
        {% endif %}
    </script>

</body>
</html>
