<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ 'Admin' if mode == 'admin' else 'Student' }} Reset Password</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .forgot-password-container {
            width: 350px;
            margin: 60px auto;
            padding: 25px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            text-align: center;
        }

        .forgot-password-header h1 {
            margin-bottom: 5px;
        }

        .form-group {
            margin: 15px 0;
            text-align: left;
        }

        input {
            width: 100%;
            padding: 10px;
            border-radius: 5px;
            border: none;
        }

        .submit-btn {
            width: 100%;
            padding: 10px;
            background: #4f46e5;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .submit-btn:hover {
            background: #4338ca;
        }

        .error-message {
            color: #f87171;
            margin-bottom: 10px;
        }

        .success-message {
            color: #22c55e;
            margin-bottom: 10px;
        }

        .back-link {
            margin-top: 10px;
        }
    </style>
</head>
<body class="fade-in">
    <div class="navbar">
        <a href="/">Home</a>
        <a href="/login">Student Login</a>
        <a href="/admin_login">Admin Login</a>
    </div>

    <div class="forgot-password-container">
        <div class="forgot-password-header">
            <h1>{{ 'Admin' if mode == 'admin' else 'Student' }} Reset Password</h1>
            <p>Choose a new password for your account.</p>
        </div>

        {% if error %}
            <div class="error-message">{{ error }}</div>
        {% endif %}

        {% if success %}
            <div class="success-message">{{ success }}</div>
        {% else %}
            <form method="POST" onsubmit="return validateResetForm()">
                <div class="form-group">
                    <label>New Password</label>
                    <input type="password" id="password" name="password" required>
                </div>

                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" id="confirm_password" name="confirm_password" required>
                </div>

                <button type="submit" class="submit-btn">Update Password</button>
            </form>
        {% endif %}

        <div class="back-link">
            <a href="{{ '/admin_login' if mode == 'admin' else '/login' }}">Back to Login</a>
        </div>
    </div>

    <script>
        function validateResetForm() {
            const password = document.getElementById("password").value.trim();
            const confirmPassword = document.getElementById("confirm_password").value.trim();
            const minimumLength = {{ 6 if mode == 'admin' else 4 }};

            if (password.length < minimumLength) {
                alert("Password must be at least " + minimumLength + " characters.");
                return false;
            }

            if (password !== confirmPassword) {
                alert("Passwords do not match.");
                return false;
            }

            return true;
        }
    </script>
</body>
</html>
