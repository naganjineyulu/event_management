<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Browse and register for university events - cultural, sports, and technical activities happening on campus">
    <meta name="keywords" content="events, university events, campus activities, event registration">
    <meta name="author" content="Event Management Team">
    <meta property="og:title" content="Available Events | University Event Management">
    <meta property="og:description" content="Discover and participate in university events">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Events">
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    <title>Events | University Event Management Platform</title>

    <!-- Global CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="fade-in">

    <!-- ===== NAVIGATION BAR ===== -->
    <div class="navbar">
        <a href="/">Home</a>
        <a href="/student_dashboard">Dashboard</a>
        <a href="/events">Events</a>
        <a href="/logout">Logout</a>
    </div>

    <h2>Available Events</h2>

    <p style="font-size:16px; margin-top:5px;">
        Discover and participate in university activities
    </p>

    <!-- ===== EVENTS LIST ===== -->
    <div class="stats">

        {% for event in events %}
            <div class="card">

                <h3>{{ event.title }}</h3>

                <p style="font-size:14px; color:#cbd5f5;">
                    Category: {{ event.category }}
                </p>

                <p>
                    {{ event.description }}
                </p>

                <p style="font-weight:bold; color:#facc15;">
                    Price: ₹{{ event.price }}
                </p>

                <a href="/event/{{ event.id }}">
                    <button>View Details</button>
                </a>

            </div>
        {% endfor %}

    </div>

    <!-- PWA Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('{{ url_for("static", filename="service-worker.js") }}')
                .then(registration => console.log('Service Worker registered'))
                .catch(error => console.log('Service Worker registration failed:', error));
        }
    </script>

</body>
</html>
