<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>

    <!-- Global CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="fade-in">

    <!-- ===== ADMIN HEADER ===== -->
    <div class="admin-header">
        Admin Dashboard – Unievents
    </div>

    <!-- ===== NAVIGATION BAR ===== -->
    <div class="navbar">
        <a href="/">Home</a>
        <a href="/admin_dashboard">Dashboard</a>
        <a href="/add_event">Add Event</a>
        <a href="/logout">Logout</a>
    </div>

    <h2>Manage Events</h2>

    <p style="color:#cbd5f5;">
        View, monitor, and control university events
    </p>

    <!-- ===== EVENTS LIST ===== -->
    <div class="stats">

        {% for event in events %}
            <div class="card">

                <h3>{{ event.title }}</h3>

                <p style="font-size:14px; color:#cbd5f5;">
                    Category: {{ event.category }}
                </p>

                <p>
                    {{ event.description }}
                </p>

                <p style="font-weight:bold; color:#facc15;">
                    Price: ₹{{ event.price }}
                </p>

                <p style="font-size:13px;">
                    Date: {{ event.date }}
                </p>

            </div>
        {% endfor %}

    </div>

</body>
</html>
