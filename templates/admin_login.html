<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Admin Login - Access the university event management admin portal">
    <meta name="keywords" content="admin login, admin panel, event management">
    <meta name="author" content="Event Management Team">
    <meta property="og:title" content="Admin Login | University Event Management">
    <title>Admin Login | University Event Management</title>

    <!-- Global CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <style>
        .admin-login-container {
            max-width: 420px;
            margin: 24px auto 40px;
            padding: 28px 35px;
            border-radius: 12px;
            background: linear-gradient(135deg, rgba(20, 20, 30, 0.95) 0%, rgba(40, 40, 60, 0.95) 100%);
            border: 2px solid #fbbf24;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.7), 0 0 30px rgba(251, 191, 36, 0.2);
        }

        .admin-login-header {
            text-align: center;
            color: #fff;
            margin-bottom: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .admin-login-header .lock-icon {
            width: 58px;
            height: 58px;
            border-radius: 50%;
            display: grid;
            place-items: center;
            background: rgba(251, 191, 36, 0.12);
            border: 1px solid rgba(251, 191, 36, 0.45);
            color: #fbbf24;
            font-size: 13px;
            font-weight: 800;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            animation: lockPulse 2s infinite;
        }

        .admin-login-header h1 {
            font-size: 30px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin: 0;
            background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        @keyframes lockPulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.12);
            }
        }

        .admin-login-form {
            display: flex;
            flex-direction: column;
            gap: 16px;
            align-items: center;
            margin: 0;
            padding: 24px;
            width: 100%;
            box-sizing: border-box;
            background: rgba(15, 23, 42, 0.82);
            border-radius: 14px;
            backdrop-filter: none;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: min(100%, 356px);
        }

        .form-group label {
            color: #cbd5f5;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-align: left;
        }

        .admin-login-form input {
            width: 100%;
            box-sizing: border-box;
            margin: 0;
            padding: 14px 16px;
            border: 2px solid #444;
            border-radius: 8px;
            background-color: #1a1a2e;
            color: #fff;
            font-size: 15px;
            transition: all 0.3s ease;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .admin-login-form input:focus {
            outline: none;
            border-color: #fbbf24;
            background-color: #222233;
            box-shadow: 0 0 15px rgba(251, 191, 36, 0.25);
        }

        .admin-login-form input::placeholder {
            color: #6b7280;
        }

        .admin-login-btn {
            width: min(100%, 356px);
            margin-top: 10px;
            padding: 14px 16px;
            background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
            color: #000;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            box-shadow: 0 5px 20px rgba(251, 191, 36, 0.3);
        }

        .admin-login-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(251, 191, 36, 0.4);
        }

        .admin-login-btn:active {
            transform: translateY(-1px);
        }

        .admin-info {
            text-align: center;
            margin-top: 18px;
            padding-top: 18px;
            border-top: 1px solid #444;
            color: #cbd5f5;
            font-size: 13px;
            line-height: 1.8;
        }

        .admin-info p {
            margin: 5px 0;
        }

        .admin-info a {
            color: #fbbf24;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .admin-info a:hover {
            text-decoration: underline;
            color: #f59e0b;
        }

        .error-message {
            background: linear-gradient(135deg, #7f1d1d 0%, #991b1b 100%);
            border: 2px solid #dc2626;
            color: #fecaca;
            padding: 14px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            text-align: center;
            display: none;
            box-shadow: 0 5px 15px rgba(220, 38, 38, 0.2);
        }

        .error-message.show {
            display: block;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .security-badge {
            text-align: center;
            margin-top: 14px;
            color: #4b5563;
            font-size: 12px;
            letter-spacing: 0.5px;
        }

        .security-badge span {
            color: #10b981;
            font-weight: 700;
        }

        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent 0%, #444 50%, transparent 100%);
            margin: 18px 0 0;
        }

        .forgot-password-link {
            text-align: center;
            margin-top: 10px;
        }

        .forgot-password-link a {
            color: #fbbf24;
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .forgot-password-link a:hover {
            color: #f59e0b;
            text-decoration: underline;
        }

        @media (max-width: 520px) {
            .admin-login-container {
                width: calc(100% - 32px);
                padding: 24px 18px;
                box-sizing: border-box;
            }
        }
    </style>
</head>

<body class="fade-in" data-error="{{ error|default('', true)|e }}">

    <!-- ===== NAVIGATION BAR ===== -->
    <div class="navbar">
        <a href="/">Home</a>
        <a href="/login">Student Login</a>
        <a href="/register">Register</a>
    </div>

    <!-- ===== ADMIN LOGIN CONTAINER ===== -->
    <div class="admin-login-container">

        <div class="admin-login-header">
            <div class="lock-icon" aria-hidden="true">Lock</div>
            <h1>Admin Portal</h1>
        </div>

        <!-- Error Message -->
        <div class="error-message" id="errorMessage"></div>

        <!-- Admin Login Form -->
        <form method="POST" class="admin-login-form" onsubmit="return validateAdminForm()">

            <div class="form-group">
                <label for="username">Username</label>
                <input type="text"
                       id="username"
                       name="username"
                       placeholder="Enter admin username"
                       autocomplete="username"
                       required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password"
                       id="password"
                       name="password"
                       placeholder="Enter admin password"
                       autocomplete="current-password"
                       required>
            </div>

            <button type="submit" class="admin-login-btn">Login</button>

            <div class="forgot-password-link">
                <a href="/admin_forgot_password">Forgot Password?</a>
            </div>

        </form>

        <!-- Divider -->
        <div class="divider"></div>

        <!-- Admin Info -->
        <div class="admin-info">
            <p><strong>Authorized Personnel Only</strong></p>
            <p>This is a secure admin portal. Unauthorized access is prohibited.</p>
            <p>Don't have an account? <a href="/admin_register">Register here</a></p>
            <p>Student access? Visit <a href="/login">Student Login</a></p>
        </div>

        <!-- Security Badge -->
        <div class="security-badge">
            <span>Secure Login</span> | <span>Encrypted</span>
        </div>

    </div>

    <!-- ===== VALIDATION SCRIPT ===== -->
    <script>
        function validateAdminForm() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const errorMessage = document.getElementById('errorMessage');

            // Clear previous error
            errorMessage.classList.remove('show');

            // Validate inputs
            if (username === '') {
                showError('Username is required');
                return false;
            }

            if (password === '') {
                showError('Password is required');
                return false;
            }

            if (username.length < 3) {
                showError('Username must be at least 3 characters long');
                return false;
            }

            if (password.length < 6) {
                showError('Password must be at least 6 characters long');
                return false;
            }

            return true;
        }

        function showError(message) {
            const errorMessage = document.getElementById('errorMessage');
            errorMessage.textContent = 'Error: ' + message;
            errorMessage.classList.add('show');
        }

        document.addEventListener('DOMContentLoaded', function() {
            const serverError = document.body.dataset.error;

            if (serverError) {
                showError(serverError);
            }
        });
    </script>

</body>
</html>
